<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aditi 😊</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#a1c4fd,#fbc2eb);overflow:hidden;}
.container{text-align:center;background:white;padding:40px;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,0.15);max-width:450px;position:relative;}
h1{color:#6c63ff;margin-bottom:10px;}
p{color:#555;margin-bottom:20px;}
button{padding:12px 20px;border:none;border-radius:30px;margin:8px;font-size:15px;cursor:pointer;transition:0.3s;}
#smileBtn{background:#6c63ff;color:white;}
#notYetBtn{background:#eee;}
#jokeBtn{background:#ffb347;color:white;}
button:hover{transform:scale(1.1);} 
.hidden{display:none;}
.message{margin-top:15px;font-weight:600;color:#6c63ff;line-height:1.6;}
.big-smile{font-size:45px;margin-top:10px;}
.emoji{position:absolute;font-size:22px;animation:float 5s linear infinite;}
@keyframes float{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-600px);opacity:0;}}
.game{margin-top:15px;}
#gameArea{position:relative;height:120px;margin-top:10px;background:#f5f7ff;border-radius:15px;overflow:hidden;}
#target{position:absolute;font-size:28px;cursor:pointer;}
.score{margin-top:8px;color:#6c63ff;font-weight:600;}
</style>
</head>
<body>

<div class="container">
  <h1>Hey Aditi 😊</h1>
  <p>I just wanted to see you smile today... that's it 💛</p>
  
  <button id="smileBtn">Okay I'm Smiling 😄</button>
  <button id="notYetBtn">Not Yet 😶</button>
  <button id="jokeBtn">Tell me a joke 😂</button>
  
  <div class="message hidden" id="message">
    There it is... your smile is my favorite thing ✨<br>
    You make everything better just by being you 💫
    <div class="big-smile">😊</div>
  </div>

  <div class="message hidden" id="joke">
    Why did the bestie bring a ladder? 🤔<br>
    Because she wanted to reach your level of amazing 😎✨
  </div>

  <div class="game">
    <p>Mini Game: Catch the smile 😄</p>
    <div id="gameArea">
      <div id="target">😊</div>
    </div>
    <div class="score">Score: <span id="score">0</span></div>
  </div>
</div>

<script>
const smileBtn=document.getElementById("smileBtn");
const notYetBtn=document.getElementById("notYetBtn");
const jokeBtn=document.getElementById("jokeBtn");
const message=document.getElementById("message");
const joke=document.getElementById("joke");
const target=document.getElementById("target");
const scoreEl=document.getElementById("score");
let score=0;

notYetBtn.addEventListener("mouseover",()=>{
  const x=Math.random()*200-100;
  const y=Math.random()*200-100;
  notYetBtn.style.transform=`translate(${x}px,${y}px)`;
});

smileBtn.addEventListener("click",()=>{
  message.classList.remove("hidden");
  createEmojis();
});

jokeBtn.addEventListener("click",()=>{
  joke.classList.toggle("hidden");
});

function createEmojis(){
  const emojis=["😊","✨","💛","🌸","😄","🌈"];
  for(let i=0;i<25;i++){
    const emoji=document.createElement("div");
    emoji.classList.add("emoji");
    emoji.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
    emoji.style.left=Math.random()*100+"vw";
    emoji.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(emoji);
    setTimeout(()=>emoji.remove(),5000);
  }
}

function moveTarget(){
  const area=document.getElementById("gameArea");
  const x=Math.random()*(area.clientWidth-30);
  const y=Math.random()*(area.clientHeight-30);
  target.style.left=x+"px";
  target.style.top=y+"px";
}

target.addEventListener("click",()=>{
  score++;
  scoreEl.textContent=score;
  moveTarget();
});

setInterval(moveTarget,1200);
</script>

</body>
</html>
